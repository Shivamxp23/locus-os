version: '3.9'

networks:
  locus-net:
    driver: bridge

volumes:
  postgres-data:
  qdrant-data:
  neo4j-data:
  redis-data:
  ollama-data:
  syncthing-data:
  obsidian-vault:
  openclaw-data:

x-fastapi-env: &fastapi-env
  DATABASE_URL: postgresql+asyncpg://locus:${POSTGRES_PASSWORD}@postgres:5432/locus
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  QDRANT_URL: http://qdrant:6333
  NEO4J_URL: bolt://neo4j:7687
  OLLAMA_URL: http://ollama:11434
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  GROQ_API_KEY: ${GROQ_API_KEY}
  SECRET_KEY: ${SECRET_KEY}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
  TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
  NOTION_API_KEY: ${NOTION_API_KEY}
  NOTION_TASKS_DB_ID: ${NOTION_TASKS_DB_ID}
  NOTION_NOTES_DB_ID: ${NOTION_NOTES_DB_ID}

services:

  postgres:
    image: pgvector/pgvector:pg15
    container_name: locus-postgres
    restart: always
    environment:
      POSTGRES_DB: locus
      POSTGRES_USER: locus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - locus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: locus-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - locus-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: locus-qdrant
    restart: always
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - locus-net

  neo4j:
    image: neo4j:5-community
    container_name: locus-neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    volumes:
      - neo4j-data:/data
    networks:
      - locus-net

  ollama:
    image: ollama/ollama:latest
    container_name: locus-ollama
    restart: always
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - locus-net
    deploy:
      resources:
        limits:
          memory: 12G

  fastapi:
    build: ./backend
    container_name: locus-api
    restart: always
    user: "1000:1000"
    environment:
      <<: *fastapi-env
    volumes:
      - obsidian-vault:/vault
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - locus-net
    ports:
      - "3000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  syncthing:
    image: syncthing/syncthing:latest
    container_name: locus-syncthing
    restart: always
    user: "1000:1000"
    volumes:
      - obsidian-vault:/vault
      - syncthing-data:/var/syncthing
    networks:
      - locus-net
    ports:
      - "8384:8384"
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"

  # OpenClaw — Locus Telegram interface (Phase 1B)
  # Uses pre-built official image; locus skill mounted from repo
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: locus-openclaw
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_OWNER_ID: ${TELEGRAM_OWNER_ID:-8089688853}
      LOCUS_API_URL: http://locus-api:8000
      LOCUS_AUDIT_URL: http://locus-api:8000/api/v1/audit/openclaw
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-locus-gateway-token-2026}
      OPENCLAW_STATE_DIR: /data/openclaw
      OPENCLAW_CONFIG_PATH: /data/openclaw/openclaw.json
      LOCUS_OLLAMA_URL: http://ollama:11434
      NODE_ENV: production
    volumes:
      - openclaw-data:/data/openclaw
      - ./openclaw-config/openclaw.json:/data/openclaw/openclaw.json:ro
      # Mount only the locus skill — no other skills loaded
      - ./openclaw/skills/locus:/skills/locus:ro
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - locus-net
    ports:
      - "18789:18789"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:18789/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
