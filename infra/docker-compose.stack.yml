# Locus full stack — FastAPI + OpenClaw (built from repo) + Ollama + Postgres.
# Requires ../.env (TELEGRAM_TOKEN, TELEGRAM_OWNER_ID, LOCUS_API_URL, LOCUS_SERVICE_TOKEN, POSTGRES_PASSWORD, …).
#
#   docker compose -f infra/docker-compose.stack.yml up -d --build

name: locus-stack

services:
  locus-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: locus-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      PORT: "3000"
      OLLAMA_BASE_URL: http://locus-ollama:11434
    networks:
      - locus-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      locus-postgres:
        condition: service_healthy
      locus-ollama:
        condition: service_started

  locus-openclaw:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: locus-openclaw
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      LOCUS_API_URL: ${LOCUS_API_URL:-http://locus-api:3000}
      OPENCLAW_PLUGINS: ${OPENCLAW_PLUGINS:-telegram}
      OLLAMA_BASE_URL: http://locus-ollama:11434
    networks:
      - locus-net
    depends_on:
      locus-api:
        condition: service_started

  locus-ollama:
    image: ollama/ollama:latest
    container_name: locus-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - locus-net
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 8G

  locus-postgres:
    image: postgres:15-alpine
    container_name: locus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: locus
      POSTGRES_USER: locus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-locus-dev-password}
    ports:
      - "5432:5432"
    volumes:
      - locus-pg-data:/var/lib/postgresql/data
    networks:
      - locus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locus -d locus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  locus-pg-data:
    driver: local
  ollama-data:
    driver: local

networks:
  locus-net:
    driver: bridge
