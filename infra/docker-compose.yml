# ═══════════════════════════════════════════════════════════════
# Locus OS — Docker Compose (Production)
# Target: Oracle Cloud ARM A1 (Ubuntu 22.04)
# ═══════════════════════════════════════════════════════════════

services:
  # ── Locus API (FastAPI) ──────────────────────────────────────
  locus-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: locus-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      - PORT=3000
      - OLLAMA_BASE_URL=http://locus-ollama:11434
    networks:
      - locus-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      locus-postgres:
        condition: service_healthy
      locus-ollama:
        condition: service_started

  # ── OpenClaw (Telegram Bot + Agent) ──────────────────────────
  locus-openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: locus-openclaw
    restart: unless-stopped
    environment:
      TELEGRAM_TOKEN: "8249321165:AAHOqwRqSMfzBQx5Fbndl1B99WQnUOf_GlI"
      TELEGRAM_BOT_TOKEN: "8249321165:AAHOqwRqSMfzBQx5Fbndl1B99WQnUOf_GlI"
      TELEGRAM_OWNER_ID: "8089688853"
      LOCUS_API_URL: "http://locus-api:3000"
      LOCUS_SERVICE_TOKEN: "0ba0c3c297df2ecb9683f30551e758b42a5af9be9beb5338"
      OLLAMA_API_KEY: "ollama-local"
      OLLAMA_BASE_URL: "http://locus-ollama:11434"
      OPENCLAW_CONFIG_PATH: "/app/config/locus.config.json"
      OPENCLAW_PLUGINS: "telegram"
    volumes:
      - openclaw-config:/app/config:rw
    networks:
      - locus-net
    depends_on:
      locus-api:
        condition: service_started

  # ── Ollama (Local LLM) ────────────────────────────────────────
  locus-ollama:
    image: ollama/ollama:latest
    container_name: locus-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - locus-net
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 8G

  # ── PostgreSQL ───────────────────────────────────────────────
  locus-postgres:
    image: postgres:15-alpine
    container_name: locus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: locus
      POSTGRES_USER: locus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-locus-dev-password}
    ports:
      - "5432:5432"
    volumes:
      - locus-pg-data:/var/lib/postgresql/data
    networks:
      - locus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locus -d locus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ── Volumes ────────────────────────────────────────────────────
volumes:
  locus-pg-data:
    driver: local
  ollama-data:
    driver: local
  openclaw-config:
    driver: local

# ── Networks ───────────────────────────────────────────────────
networks:
  locus-net:
    driver: bridge
