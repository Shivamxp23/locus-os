# LOCUS Phase 1 — LOCUS_ARCHITECTURE_v4 §25:
# OpenClaw built from repo root Dockerfile + Postgres stub.
#
# From repo root:
#   docker compose -f infra/docker-compose.yml up -d --build
#
# Full stack (API + Ollama + OpenClaw): use docker-compose.stack.yml

name: locus-phase1

services:
  locus-postgres:
    image: postgres:15-alpine
    container_name: locus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: locus
      POSTGRES_USER: locus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-locus-dev-password}
    ports:
      - "5432:5432"
    volumes:
      - locus-pg-data:/var/lib/postgresql/data
    networks:
      - locus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locus -d locus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  locus-openclaw:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: locus-openclaw
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      OPENCLAW_PLUGINS: ${OPENCLAW_PLUGINS:-telegram}
    ports:
      - "18789:18789"
    depends_on:
      locus-postgres:
        condition: service_healthy
    networks:
      - locus-net

volumes:
  locus-pg-data:
    driver: local

networks:
  locus-net:
    driver: bridge
